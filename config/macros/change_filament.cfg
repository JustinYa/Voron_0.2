[respond]

[gcode_macro _FILAMENT_VARS]
variable_load_temp: 210
variable_unload_temp: 210
variable_last_temp: 210
variable_load_len: 70
variable_purge_len: 60
variable_purge_more_len: 30
variable_unload_len: 80
gcode:

[gcode_macro _FILAMENT_PROMPT_CANCEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M118 Filament action cancelled


[gcode_macro LOAD_FILAMENT]
description: Load filament with dashboard prompt
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Choose material:"
    RESPOND TYPE=command MSG="action:prompt_button PLA|_LOAD_FILAMENT_SELECT TEMP=210|primary"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_LOAD_FILAMENT_SELECT TEMP=235|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_LOAD_FILAMENT_SELECT TEMP=245|primary"
    RESPOND TYPE=command MSG="action:prompt_button TPU|_LOAD_FILAMENT_SELECT TEMP=225|primary"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|_FILAMENT_PROMPT_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_SELECT]
gcode:
    {% set temp = params.TEMP|default(210)|int %}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=load_temp VALUE={temp}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_temp VALUE={temp}
    _LOAD_FILAMENT_HEAT

[gcode_macro _LOAD_FILAMENT_HEAT]
gcode:
    {% set temp = printer["gcode_macro _FILAMENT_VARS"].load_temp|int %}
    RESPOND TYPE=command MSG="action:prompt_end"
    M118 Heating hotend to {temp}C
    M104 S{temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={temp}
    _LOAD_FILAMENT_PURGE

[gcode_macro _LOAD_FILAMENT_PURGE]
gcode:
    {% set load_len = printer["gcode_macro _FILAMENT_VARS"].load_len|float %}
    {% set purge = printer["gcode_macro _FILAMENT_VARS"].purge_len|float %}
    M118 Loading filament...
    SAVE_GCODE_STATE NAME=LOAD_FILAMENT_STATE
    M83
    G1 E{load_len} F300
    G1 E{purge} F250
    M400
    RESTORE_GCODE_STATE NAME=LOAD_FILAMENT_STATE
    _LOAD_FILAMENT_PURGE_CHECK

[gcode_macro _LOAD_FILAMENT_PURGE_CHECK]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Purge Enough?"
    RESPOND TYPE=command MSG="action:prompt_text Is the new filament color flowing cleanly?"
    RESPOND TYPE=command MSG="action:prompt_button Yes - Done|_LOAD_FILAMENT_DONE|primary"
    RESPOND TYPE=command MSG="action:prompt_button No - Purge More|_LOAD_FILAMENT_PURGE_MORE|warning"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_PURGE_MORE]
gcode:
    {% set purge_more = printer["gcode_macro _FILAMENT_VARS"].purge_more_len|float %}
    RESPOND TYPE=command MSG="action:prompt_end"
    SAVE_GCODE_STATE NAME=LOAD_FILAMENT_MORE_STATE
    M83
    G1 E{purge_more} F250
    M400
    RESTORE_GCODE_STATE NAME=LOAD_FILAMENT_MORE_STATE
    _LOAD_FILAMENT_PURGE_CHECK

[gcode_macro _LOAD_FILAMENT_DONE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M118 Filament load complete
    M104 S185


[gcode_macro UNLOAD_FILAMENT]
description: Unload filament with dashboard prompt
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Unload Filament"
    RESPOND TYPE=command MSG="action:prompt_text Do we know the material profile?"
    RESPOND TYPE=command MSG="action:prompt_button Yes - Use Last Temp|_UNLOAD_FILAMENT_USE_LAST|primary"
    RESPOND TYPE=command MSG="action:prompt_button No - Choose Material|_UNLOAD_FILAMENT_ASK_MATERIAL|warning"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|_FILAMENT_PROMPT_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _UNLOAD_FILAMENT_USE_LAST]
gcode:
    {% set temp = printer["gcode_macro _FILAMENT_VARS"].last_temp|int %}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=unload_temp VALUE={temp}
    _UNLOAD_FILAMENT_HEAT

[gcode_macro _UNLOAD_FILAMENT_ASK_MATERIAL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Unload Filament"
    RESPOND TYPE=command MSG="action:prompt_text Choose material:"
    RESPOND TYPE=command MSG="action:prompt_button PLA|_UNLOAD_FILAMENT_SELECT TEMP=210|primary"
    RESPOND TYPE=command MSG="action:prompt_button PETG|_UNLOAD_FILAMENT_SELECT TEMP=235|primary"
    RESPOND TYPE=command MSG="action:prompt_button ABS|_UNLOAD_FILAMENT_SELECT TEMP=245|primary"
    RESPOND TYPE=command MSG="action:prompt_button TPU|_UNLOAD_FILAMENT_SELECT TEMP=225|primary"
    RESPOND TYPE=command MSG="action:prompt_button Cancel|_FILAMENT_PROMPT_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _UNLOAD_FILAMENT_SELECT]
gcode:
    {% set temp = params.TEMP|default(210)|int %}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=unload_temp VALUE={temp}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=last_temp VALUE={temp}
    _UNLOAD_FILAMENT_HEAT

[gcode_macro _UNLOAD_FILAMENT_HEAT]
gcode:
    {% set temp = printer["gcode_macro _FILAMENT_VARS"].unload_temp|int %}
    RESPOND TYPE=command MSG="action:prompt_end"
    M118 Heating hotend to {temp}C
    M104 S{temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={temp}
    _UNLOAD_FILAMENT_PULL

[gcode_macro _UNLOAD_FILAMENT_PULL]
gcode:
    {% set unload_len = printer["gcode_macro _FILAMENT_VARS"].unload_len|float %}
    M118 Unloading filament...
    SAVE_GCODE_STATE NAME=UNLOAD_FILAMENT_STATE
    M83
    G1 E5 F250
    G1 E-20 F1200
    G1 E-{unload_len} F1800
    M400
    RESTORE_GCODE_STATE NAME=UNLOAD_FILAMENT_STATE
    _UNLOAD_FILAMENT_DONE

[gcode_macro _UNLOAD_FILAMENT_DONE]
gcode:
    M118 Filament unload complete
    M104 S0